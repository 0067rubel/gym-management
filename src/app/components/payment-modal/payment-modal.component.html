<div class="modal-overlay" (click)="cancel.emit()">
  <div class="modal-box" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h2>💳 Add Payment</h2>
        <p>{{ member.name }} — {{ member.membershipType }}</p>
      </div>
      <button class="close-btn" (click)="cancel.emit()">✕</button>
    </div>

    <div class="payment-summary">
      <div class="summary-item">
        <span>Total Paid</span>
        <strong>৳ {{ totalPaid | number }}</strong>
      </div>
      <div class="summary-item">
        <span>Payments</span>
        <strong>{{ existingPayments.length }}</strong>
      </div>
      <div class="summary-item">
        <span>Status</span>
        <strong [class]="'s-' + member.status.toLowerCase()">{{ member.status }}</strong>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #f="ngForm" class="pay-form">
      <div class="form-group">
        <label>Amount (৳) *</label>
        <input type="number" [(ngModel)]="form.amount" name="amount" placeholder="0" min="1" required />
      </div>
      <div class="form-group">
        <label>Payment Date *</label>
        <input type="date" [(ngModel)]="form.paymentDate" name="paymentDate" required />
      </div>
      <div class="form-group">
        <label>Payment Method *</label>
        <select [(ngModel)]="form.paymentMethod" name="paymentMethod" required>
          <option *ngFor="let m of paymentMethods" [value]="m">{{ m }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Membership Period *</label>
        <input type="text" [(ngModel)]="form.membershipPeriod" name="membershipPeriod" placeholder="e.g. Jan 2025" required />
      </div>

      <div class="history" *ngIf="existingPayments.length > 0">
        <h4>Payment History</h4>
        <div class="history-item" *ngFor="let p of existingPayments">
          <span>{{ p.paymentDate | date:'mediumDate' }}</span>
          <span class="method">{{ p.paymentMethod }}</span>
          <span>{{ p.membershipPeriod }}</span>
          <strong>৳ {{ p.amount | number }}</strong>
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cancel.emit()">Cancel</button>
        <button type="submit" class="btn-save" [disabled]="f.invalid || form.amount <= 0">Record Payment</button>
      </div>
    </form>
  </div>
</div>
